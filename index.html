<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Viral Videos 🔥</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    max-width:500px;
    margin:auto;
    padding:10px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.video{
    position:relative;
}
.video img{
    width:100%;
    border-radius:10px;
}
.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#fff;
    background:rgba(0,0,0,0.5);
    padding:10px 15px;
    border-radius:50%;
}

.title{
    font-weight:bold;
    margin:10px 0;
}

.buttons{
    display:flex;
    gap:10px;
}
.buttons a{
    flex:1;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    color:#fff;
}
.btn1{ background:#007bff; }
.btn2{ background:#28a745; }
.btn3{ background:#ff9800; }

.desc{
    font-size:13px;
    color:#555;
    margin-top:10px;
}
</style>

</head>
